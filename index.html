<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Polos | Supabase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── TU CSS ORIGINAL ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F5F0; --surface: #FFFFFF; --border: #E8E4DC;
      --border-strong: #C8C2B8; --text: #1A1814; --text-muted: #7A7368;
      --accent: #1A1814; --accent-fg: #FFFFFF; --red: #C0392B;
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--accent); color: white; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 50;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    
    .cart-icon-btn {
      background: none; border: 1.5px solid rgba(255,255,255,0.3); color: white;
      border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }

    .tabs-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 1.5rem;
    }
    .tab-btn {
      padding: 14px 20px; font-size: 13px; font-weight: 500;
      background: none; border: none; cursor: pointer; color: var(--text-muted);
    }
    .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--accent); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .panel { display: none; }
    .panel.active { display: block; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; }
    .product-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
    }
    .product-card img { width: 100%; height: 200px; object-fit: cover; }
    .product-card-body { padding: 12px; }

    /* Estilos del Modal y Admin (Simplificados para brevedad, conservando tu estructura) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    
    .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
    .field { margin-bottom: 15px; }
    .field input, .field textarea { width: 100%; padding: 10px; border: 1px solid var(--border-strong); border-radius: 8px; }
    .save-product-btn { background: var(--accent); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
    
    .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .wsp-btn { background: #25D366; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div class="logo">👕 MiTienda Polos</div>
  <button class="cart-icon-btn" onclick="switchTab('cart')">🛒 Carrito</button>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-store" onclick="switchTab('store')">🛍️ Tienda</button>
  <button class="tab-btn" id="tab-cart" onclick="switchTab('cart')">🛒 Carrito</button>
  <button class="tab-btn" id="tab-admin" onclick="switchTab('admin')">⚙️ Administrar</button>
</div>

<main>
  <div class="panel active" id="panel-store">
    <div class="products-grid" id="storeGrid">
      <p>Cargando polos desde la base de datos...</p>
    </div>
  </div>

  <div class="panel" id="panel-cart">
    <div class="admin-card">
      <h3>Tu Pedido</h3>
      <div id="cartItemsList">El carrito está vacío.</div>
      <div id="cartFooter" style="display:none">
        <h4 id="cartTotalVal">Total: S/ 0.00</h4>
        <button class="wsp-btn" onclick="sendWhatsApp()">Enviar pedido por WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-admin">
    <div class="admin-card">
      <h3>➕ Agregar Nuevo Polo</h3>
      <div class="field">
        <label>Foto del polo</label>
        <input type="file" id="imgFileInput" accept="image/*">
      </div>
      <div class="field">
        <input type="text" id="prodName" placeholder="Nombre del polo">
      </div>
      <div class="field">
        <input type="number" id="prodPrice" placeholder="Precio (ej: 35.00)">
      </div>
      <button class="save-product-btn" id="saveBtn" onclick="saveProduct()">💾 Subir a la Tienda</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <img id="modalImg" src="" style="width:100%; border-radius:8px;">
    <h2 id="modalName" style="margin-top:10px;"></h2>
    <p id="modalPrice" style="color:var(--text-muted);"></p>
    <button class="save-product-btn" onclick="addToCartFromModal()">Agregar al Carrito</button>
    <button class="tab-btn" onclick="closeModal()" style="width:100%; margin-top:5px;">Cerrar</button>
  </div>
</div>

<script>
// 1. CONFIGURACIÓN SUPABASE
const supabaseUrl = 'https://nbcxafnjolasdmleqjhp.supabase.co';
const supabaseKey = 'sb_publishable_0CmPrpHpz_iz8ZOI04uZ4A_VcNCpncN'; // <--- PEGA AQUÍ TU LLAVE
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let cart = [];
let selectedPoloForModal = null;

// 2. CARGAR PRODUCTOS
async function loadProducts() {
    const { data: polos, error } = await _supabase.from('polos').select('*');
    if (error) return console.log("Error:", error);

    const grid = document.getElementById('storeGrid');
    grid.innerHTML = '';
    polos.forEach(p => {
        grid.innerHTML += `
            <div class="product-card" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                <img src="${p.imagen_url}">
                <div class="product-card-body">
                    <strong>${p.nombre}</strong>
                    <p>S/ ${p.precio}</p>
                </div>
            </div>`;
    });
}

// 3. SUBIR PRODUCTO (STORAGE + DB)
async function saveProduct() {
    const btn = document.getElementById('saveBtn');
    const file = document.getElementById('imgFileInput').files[0];
    const nombre = document.getElementById('prodName').value;
    const precio = document.getElementById('prodPrice').value;

    if (!file || !nombre || !precio) return alert("Completa todos los campos");

    btn.disabled = true;
    btn.innerText = "Subiendo...";

    const fileName = `${Date.now()}_${file.name}`;
    const { data: uploadData, error: upErr } = await _supabase.storage
        .from('imagenes-polos')
        .upload(fileName, file);

    if (upErr) {
        alert("Error al subir imagen");
        btn.disabled = false;
        return;
    }

    const { data: urlData } = _supabase.storage.from('imagenes-polos').getPublicUrl(fileName);

    const { error: dbErr } = await _supabase.from('polos').insert([
        { nombre: nombre, precio: parseFloat(precio), imagen_url: urlData.publicUrl }
    ]);

    if (dbErr) alert("Error en DB");
    else {
        alert("¡Polo publicado!");
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        loadProducts();
        switchTab('store');
    }
    btn.disabled = false;
    btn.innerText = "💾 Subir a la Tienda";
}

// 4. LÓGICA DE TIENDA Y CARRITO
function openModal(polo) {
    selectedPoloForModal = polo;
    document.getElementById('modalImg').src = polo.imagen_url;
    document.getElementById('modalName').innerText = polo.nombre;
    document.getElementById('modalPrice').innerText = "S/ " + polo.precio;
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

function addToCartFromModal() {
    cart.push(selectedPoloForModal);
    renderCart();
    closeModal();
    alert("Agregado al carrito");
}

function renderCart() {
    const list = document.getElementById('cartItemsList');
    const footer = document.getElementById('cartFooter');
    if (cart.length === 0) {
        list.innerHTML = "El carrito está vacío.";
        footer.style.display = 'none';
        return;
    }
    footer.style.display = 'block';
    list.innerHTML = '';
    let total = 0;
    cart.forEach((item, index) => {
        total += parseFloat(item.precio);
        list.innerHTML += `
            <div class="cart-item">
                <span>${item.nombre}</span>
                <span>S/ ${item.precio} <button onclick="removeFromCart(${index})">❌</button></span>
            </div>`;
    });
    document.getElementById('cartTotalVal').innerText = `Total: S/ ${total.toFixed(2)}`;
}

function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
}

function sendWhatsApp() {
    let msg = "Hola! Quiero pedir los siguientes polos:%0A";
    cart.forEach(item => msg += `- ${item.nombre} (S/ ${item.precio})%0A`);
    window.open(`https://wa.me/912334187?text=${msg}`); // Cambia el número por el tuyo
}

function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

// Inicializar
loadProducts();
</script>

</body>
</html>
