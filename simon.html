<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMON</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00ff88;
    --red:    #ff2255;
    --yellow: #ffe600;
    --blue:   #00b8ff;
    --green-dim:  #004422;
    --red-dim:    #440011;
    --yellow-dim: #443300;
    --blue-dim:   #001133;
    --green-glow:  0 0 30px #00ff88, 0 0 60px #00ff8866;
    --red-glow:    0 0 30px #ff2255, 0 0 60px #ff225566;
    --yellow-glow: 0 0 30px #ffe600, 0 0 60px #ffe60066;
    --blue-glow:   0 0 30px #00b8ff, 0 0 60px #00b8ff66;
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,184,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,184,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Header */
  .header {
    text-align: center;
    letter-spacing: 0.3em;
  }

  .title {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,184,255,0.8), 0 0 40px rgba(0,184,255,0.4);
    line-height: 1;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: #00b8ff;
    letter-spacing: 0.5em;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* Score panel */
  .scores {
    display: flex;
    gap: 32px;
  }

  .score-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 24px;
    text-align: center;
    min-width: 100px;
  }

  .score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    color: #ffffff44;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  #record-val { color: var(--yellow); text-shadow: var(--yellow-glow); }

  /* Main simon board */
  .board {
    position: relative;
    width: min(320px, 85vw);
    height: min(320px, 85vw);
  }

  .board-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(0,184,255,0.15);
  }
  .board-ring2 {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(0,184,255,0.06);
  }

  .buttons-grid {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
  }

  /* Center circle overlay */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 28%;
    height: 28%;
    background: var(--bg);
    border-radius: 50%;
    border: 2px solid #1a1a2e;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .center-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0,184,255,0.3);
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: filter 0.08s, transform 0.08s;
    position: relative;
    outline: none;
  }

  .btn:active { transform: scale(0.96); }

  .btn-green  { background: var(--green-dim);  border-radius: 100% 0 0 0; }
  .btn-red    { background: var(--red-dim);    border-radius: 0 100% 0 0; }
  .btn-yellow { background: var(--yellow-dim); border-radius: 0 0 0 100%; }
  .btn-blue   { background: var(--blue-dim);   border-radius: 0 0 100% 0; }

  .btn-green.lit  { background: var(--green);  box-shadow: var(--green-glow);  filter: brightness(1.2); }
  .btn-red.lit    { background: var(--red);    box-shadow: var(--red-glow);    filter: brightness(1.2); }
  .btn-yellow.lit { background: var(--yellow); box-shadow: var(--yellow-glow); filter: brightness(1.2); }
  .btn-blue.lit   { background: var(--blue);   box-shadow: var(--blue-glow);   filter: brightness(1.2); }

  .btn-green::after  { content:''; position:absolute; inset:0; border-radius:inherit; background: radial-gradient(circle at 30% 30%, rgba(0,255,136,0.2), transparent 60%); }
  .btn-red::after    { content:''; position:absolute; inset:0; border-radius:inherit; background: radial-gradient(circle at 70% 30%, rgba(255,34,85,0.2), transparent 60%); }
  .btn-yellow::after { content:''; position:absolute; inset:0; border-radius:inherit; background: radial-gradient(circle at 30% 70%, rgba(255,230,0,0.2), transparent 60%); }
  .btn-blue::after   { content:''; position:absolute; inset:0; border-radius:inherit; background: radial-gradient(circle at 70% 70%, rgba(0,184,255,0.2), transparent 60%); }

  /* Status / message */
  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: #ffffff55;
    letter-spacing: 0.2em;
    min-height: 20px;
    text-align: center;
  }

  .status.watching { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
  .status.your-turn { color: var(--green); text-shadow: 0 0 8px var(--green); }
  .status.error { color: var(--red); text-shadow: 0 0 8px var(--red); }

  /* Start button */
  .start-btn {
    background: transparent;
    border: 1px solid rgba(0,184,255,0.5);
    color: #00b8ff;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 14px 40px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,184,255,0.08);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }

  .start-btn:hover {
    border-color: var(--blue);
    box-shadow: 0 0 20px rgba(0,184,255,0.3);
    color: #fff;
  }

  .start-btn:hover::before { transform: translateX(0); }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Game Over overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .gameover-card {
    background: var(--panel);
    border: 1px solid #ff225533;
    border-radius: 12px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,34,85,0.2);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .overlay.show .gameover-card { transform: scale(1); }

  .gameover-title {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--red);
    text-shadow: var(--red-glow);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }

  .gameover-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #ffffff44;
    letter-spacing: 0.3em;
    margin-bottom: 28px;
  }

  .gameover-score {
    font-size: 4rem;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }

  .gameover-score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: #ffffff44;
    letter-spacing: 0.4em;
    margin-bottom: 20px;
  }

  .new-record {
    background: rgba(255,230,0,0.1);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 4px;
    padding: 6px 16px;
    color: var(--yellow);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    margin-bottom: 24px;
    display: none;
  }

  .new-record.show { display: block; }

  .retry-btn {
    background: transparent;
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--green);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 12px 32px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.05);
  }

  /* Pulse animation for waiting */
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .status.your-turn { animation: pulse 1s infinite; }

  /* Level indicator */
  .level-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 300px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffffff11;
    border: 1px solid #ffffff22;
    transition: all 0.3s;
  }

  .dot.filled { background: #00b8ff; border-color: #00b8ff; box-shadow: 0 0 6px #00b8ff; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="title">SIMON</div>
    <div class="subtitle">memory sequence game</div>
  </div>

  <div class="scores">
    <div class="score-box">
      <div class="score-label">Nivel</div>
      <div class="score-value" id="level-val">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Récord</div>
      <div class="score-value" id="record-val">0</div>
    </div>
  </div>

  <div class="board">
    <div class="board-ring"></div>
    <div class="board-ring2"></div>
    <div class="buttons-grid">
      <button class="btn btn-green"  data-color="green"  onclick="playerPress('green')"  aria-label="Verde"></button>
      <button class="btn btn-red"    data-color="red"    onclick="playerPress('red')"    aria-label="Rojo"></button>
      <button class="btn btn-yellow" data-color="yellow" onclick="playerPress('yellow')" aria-label="Amarillo"></button>
      <button class="btn btn-blue"   data-color="blue"   onclick="playerPress('blue')"   aria-label="Azul"></button>
    </div>
    <div class="center"><div class="center-dot"></div></div>
  </div>

  <div class="level-dots" id="dots"></div>

  <div class="status" id="status">— presiona iniciar para jugar —</div>

  <button class="start-btn" id="start-btn" onclick="startGame()">INICIAR JUEGO</button>
</div>

<!-- Game Over overlay -->
<div class="overlay" id="overlay">
  <div class="gameover-card">
    <div class="gameover-title">GAME OVER</div>
    <div class="gameover-sub">secuencia incorrecta</div>
    <div class="gameover-score" id="final-score">0</div>
    <div class="gameover-score-label">nivel alcanzado</div>
    <div class="new-record" id="new-record-badge">★ NUEVO RÉCORD ★</div>
    <button class="retry-btn" onclick="closeOverlay()">REINTENTAR</button>
  </div>
</div>

<script>
const COLORS = ['green','red','yellow','blue'];
const FREQS  = { green: 415, red: 310, yellow: 252, blue: 209 };

let sequence = [], playerSeq = [], level = 0, record = 0;
let accepting = false, playing = false;

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(color, duration = 300) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = FREQS[color];
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
  osc.start();
  osc.stop(ctx.currentTime + duration / 1000);
}

function playError() {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 80;
  osc.type = 'sawtooth';
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

function flash(color, duration = 300) {
  const btn = document.querySelector(`.btn-${color}`);
  btn.classList.add('lit');
  setTimeout(() => btn.classList.remove('lit'), duration);
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

function updateScore() {
  document.getElementById('level-val').textContent = level;
  document.getElementById('record-val').textContent = record;
}

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  const total = Math.max(level, 10);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < level ? ' filled' : '');
    el.appendChild(d);
  }
}

async function playSequence() {
  accepting = false;
  setStatus('observa la secuencia...', 'watching');
  const delay = Math.max(250, 600 - level * 20);
  const gap   = Math.max(100, 300 - level * 10);

  await sleep(700);
  for (const color of sequence) {
    flash(color, delay);
    playTone(color, delay);
    await sleep(delay + gap);
  }

  playerSeq = [];
  accepting = true;
  setStatus('tu turno — repite la secuencia', 'your-turn');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function startGame() {
  if (ctx.state === 'suspended') ctx.resume();
  sequence = [];
  playerSeq = [];
  level = 0;
  playing = true;
  document.getElementById('start-btn').disabled = true;
  nextRound();
}

function nextRound() {
  level++;
  const next = COLORS[Math.floor(Math.random() * 4)];
  sequence.push(next);
  updateScore();
  buildDots();
  playSequence();
}

function playerPress(color) {
  if (!accepting || !playing) return;
  if (ctx.state === 'suspended') ctx.resume();

  flash(color, 200);
  playTone(color, 200);
  playerSeq.push(color);

  const idx = playerSeq.length - 1;
  if (playerSeq[idx] !== sequence[idx]) {
    gameOver();
    return;
  }

  if (playerSeq.length === sequence.length) {
    accepting = false;
    setStatus('¡correcto!', '');
    setTimeout(nextRound, 1000);
  }
}

async function gameOver() {
  accepting = false;
  playing = false;
  playError();

  document.querySelectorAll('.btn').forEach(b => b.classList.add('lit'));
  await sleep(200);
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('lit'));
  await sleep(100);
  document.querySelectorAll('.btn').forEach(b => b.classList.add('lit'));
  await sleep(200);
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('lit'));

  setStatus('error', 'error');
  await sleep(600);

  const isRecord = level > record;
  if (isRecord) {
    record = level;
    localStorage.setItem('simon_record', record);
  }

  document.getElementById('final-score').textContent = level;
  document.getElementById('new-record-badge').classList.toggle('show', isRecord);
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('start-btn').disabled = false;
  level = 0;
  updateScore();
  buildDots();
  setStatus('— presiona iniciar para jugar —', '');
}

// Load record
record = parseInt(localStorage.getItem('simon_record') || '0');
updateScore();
buildDots();
</script>
</body>
</html>
