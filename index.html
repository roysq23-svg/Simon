<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLO STUDIO | Store & Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #f4f4f4;
            --accent: #ff4d00;
            --red: #e74c3c;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); line-height: 1.6; }

        /* HEADER */
        header { padding: 15px 5%; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--gray); }
        nav { display: flex; justify-content: space-between; align-items: center; }
        /* Corrección del Logo: Se ajusta al nombre exacto de tu GitHub */
        .logo img { height: 45px; cursor: pointer; vertical-align: middle; }
        
        .menu { display: flex; align-items: center; gap: 15px; }
        .menu button { background: none; border: none; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .cart-btn { position: relative; font-size: 18px !important; }
        #cart-count { background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; position: absolute; top: -5px; right: -10px; }

        /* SISTEMA DE PANELES (VISTAS INDEPENDIENTES) */
        .panel { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TIENDA */
        .section-title { text-align: center; font-family: 'Syne', sans-serif; font-size: clamp(24px, 5vw, 36px); margin-bottom: 40px; text-transform: uppercase; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { cursor: pointer; transition: transform 0.3s ease; border-radius: 12px; overflow: hidden; background: white; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 350px; object-fit: cover; background: var(--gray); }
        .product-info { padding: 20px; text-align: center; }
        .product-info h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 8px; }
        .product-info p { color: var(--accent); font-weight: 700; font-size: 16px; }

        /* ADMIN APARTADO (DISEÑO PROFESIONAL) */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--black); padding-bottom: 15px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; align-items: start; }
        .admin-card { background: var(--gray); padding: 30px; border-radius: 15px; box-shadow: var(--shadow); }
        .admin-card h3 { margin-bottom: 20px; font-family: 'Syne', sans-serif; border-left: 4px solid var(--black); padding-left: 10px; }
        
        .admin-form input, .admin-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; }
        .file-drop-area { display: block; padding: 30px; border: 2px dashed #bbb; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 15px; transition: 0.3s; background: white; }
        .file-drop-area:hover { border-color: var(--black); background: #fafafa; }

        /* LISTA CRUD EN ADMIN */
        .inventory-list { max-height: 600px; overflow-y: auto; padding-right: 10px; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .inventory-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
        .item-info { flex-grow: 1; margin-left: 15px; }
        .item-info h4 { font-size: 14px; margin: 0; }
        .item-actions { display: flex; gap: 10px; }
        .btn-edit { color: #3498db; background: none; border: none; cursor: pointer; font-weight: 600; }
        .btn-delete { color: var(--red); background: none; border: none; cursor: pointer; font-weight: 600; }

        /* BOTONES GLOBALES */
        .btn-primary { background: var(--black); color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-primary:hover { background: #333; transform: scale(1.02); }
        .btn-outline { background: none; border: 1px solid var(--black); padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        /* MODAL DE PRODUCTO */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; width: 100%; max-width: 900px; border-radius: 15px; overflow: hidden; display: flex; position: relative; max-height: 90vh; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 30px; border: none; background: none; cursor: pointer; z-index: 10; }
        .modal-img { width: 50%; object-fit: cover; background: var(--gray); }
        .modal-content { width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .modal-content h2 { font-family: 'Syne', sans-serif; font-size: 28px; margin-bottom: 10px; }
        .modal-price { font-size: 24px; color: var(--accent); font-weight: 800; margin-bottom: 15px; }
        .modal-desc { font-size: 15px; color: #555; margin-bottom: 30px; }

        /* TOAST DE AVISO */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--black); color: white; padding: 12px 30px; border-radius: 50px; z-index: 5000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 500; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* RESPONSIVO */
        @media (max-width: 850px) {
            .admin-grid { grid-template-columns: 1fr; }
            .modal { flex-direction: column; overflow-y: auto; }
            .modal-img, .modal-content { width: 100%; }
            .modal-img { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo" id="secretLogo">
                <img src="Logo.jpeg" alt="POLO STUDIO" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
            </div>
            <div class="menu">
                <button onclick="switchTab('store')">Tienda</button>
                <button id="tab-admin" onclick="switchTab('admin')" style="display:none !important; color: var(--accent);">Gestión</button>
                <button class="cart-btn" onclick="switchTab('cart')">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="panel-store" class="panel active">
            <h2 class="section-title">Nuestros Polos</h2>
            <div class="products-grid" id="storeGrid"></div>
        </section>

        <section id="panel-cart" class="panel">
            <h2 class="section-title">Tu Pedido</h2>
            <div id="cartItemsList" style="max-width: 600px; margin: 0 auto;"></div>
            <div id="cartFooter" style="display:none; max-width: 600px; margin: 30px auto; text-align: center;">
                <h3 id="cartTotalVal" style="font-size: 24px; margin-bottom: 20px;">Total: S/ 0.00</h3>
                <button class="btn-primary" style="background: #25D366;" onclick="sendWhatsApp()">PEDIR POR WHATSAPP</button>
            </div>
        </section>

        <section id="panel-admin" class="panel">
            <div class="admin-header">
                <h2>PANEL DE CONTROL</h2>
                <button class="btn-outline" onclick="switchTab('store')">Salir de Admin</button>
            </div>
            
            <div class="admin-grid">
                <div class="admin-card admin-form">
                    <h3 id="formTitle">Agregar Nuevo Polo</h3>
                    <input type="hidden" id="editPoloId">
                    
                    <label for="imgFileInput" class="file-drop-area" id="fileLabel">
                        📷 Seleccionar Imagen del Polo
                    </label>
                    <input type="file" id="imgFileInput" accept="image/*" hidden onchange="updateLabel()">
                    
                    <input type="text" id="prodName" placeholder="Nombre del Producto">
                    <input type="number" id="prodPrice" placeholder="Precio (S/)">
                    <textarea id="prodDesc" placeholder="Descripción detallada (tallas, tela, etc.)" rows="5"></textarea>
                    
                    <button class="btn-primary" id="saveBtn" onclick="saveProduct()">GUARDAR CAMBIOS</button>
                    <button id="cancelEdit" style="display:none; margin-top:15px; width:100%; background:none; border:none; cursor:pointer; color: #666;" onclick="resetForm()">Cancelar Edición</button>
                </div>

                <div class="admin-card">
                    <h3>Inventario en Supabase</h3>
                    <div id="adminInventoryList" class="inventory-list">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">×</button>
            <img id="modalImg" class="modal-img" src="">
            <div class="modal-content">
                <h2 id="modalName"></h2>
                <p id="modalPrice" class="modal-price"></p>
                <p id="modalDesc" class="modal-desc"></p>
                <button class="btn-primary" onclick="addToCartFromModal()">AÑADIR AL CARRITO</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN OBTENIDA DE TUS CAPTURAS
        const supabaseUrl = 'https://nbcxafnjolasdmleqjhp.supabase.co';
        const supabaseKey = 'sb_publishable_0CmPrpHpz_iz8ZOI04uZ4A_VcNcp';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let cart = [];
        let selectedPolo = null;
        let secretClicks = 0;

        // NAVEGACIÓN
        function switchTab(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tabId).classList.add('active');
            
            if(tabId === 'admin') loadInventory();
            if(tabId === 'cart') renderCart();
            window.scrollTo(0,0);
        }

        // CARGAR TIENDA
        async function loadProducts() {
            const { data: polos, error } = await _supabase.from('polos').select('*').order('id', { ascending: false });
            if (error) return console.error(error);
            
            const grid = document.getElementById('storeGrid');
            grid.innerHTML = '';
            polos.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick='openModal(${JSON.stringify(p)})'>
                        <img src="${p.imagen_url}" alt="${p.nombre}">
                        <div class="product-info">
                            <h3>${p.nombre}</h3>
                            <p>S/ ${p.precio.toFixed(2)}</p>
                        </div>
                    </div>`;
            });
        }

        // CARGAR INVENTARIO (LISTA CRUD)
        async function loadInventory() {
            const { data: polos, error } = await _supabase.from('polos').select('*').order('id', { ascending: false });
            const list = document.getElementById('adminInventoryList');
            list.innerHTML = '';
            
            polos.forEach(p => {
                list.innerHTML += `
                    <div class="inventory-item">
                        <img src="${p.imagen_url}">
                        <div class="item-info">
                            <h4>${p.nombre}</h4>
                            <small>S/ ${p.precio}</small>
                        </div>
                        <div class="item-actions">
                            <button class="btn-edit" onclick='prepareEdit(${JSON.stringify(p)})'>Editar</button>
                            <button class="btn-delete" onclick="deletePolo(${p.id})">Borrar</button>
                        </div>
                    </div>`;
            });
        }

        // GUARDAR O EDITAR EN SUPABASE
        async function saveProduct() {
            const id = document.getElementById('editPoloId').value;
            const nombre = document.getElementById('prodName').value;
            const precio = document.getElementById('prodPrice').value;
            const descripcion = document.getElementById('prodDesc').value;
            const file = document.getElementById('imgFileInput').files[0];

            if (!nombre || !precio) return showToast("⚠️ Ingresa nombre y precio");
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "PROCESANDO..."; btn.disabled = true;

            let updateData = { nombre, precio: parseFloat(precio), descripcion };

            try {
                if (file) {
                    const fileName = `polo_${Date.now()}.png`;
                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('imagenes-polos')
                        .upload(fileName, file);
                    
                    if (uploadError) throw uploadError;

                    const { data: urlData } = _supabase.storage
                        .from('imagenes-polos')
                        .getPublicUrl(fileName);
                    
                    updateData.imagen_url = urlData.publicUrl;
                }

                if (id) {
                    await _supabase.from('polos').update(updateData).eq('id', id);
                } else {
                    if (!updateData.imagen_url) throw new Error("Debes subir una imagen");
                    await _supabase.from('polos').insert([updateData]);
                }

                showToast("✅ ¡Listo!");
                resetForm(); loadProducts(); loadInventory();
            } catch (e) {
                showToast("❌ Error: " + e.message);
            } finally {
                btn.innerText = "GUARDAR CAMBIOS"; btn.disabled = false;
            }
        }

        async function deletePolo(id) {
            if (!confirm("¿Eliminar este producto?")) return;
            await _supabase.from('polos').delete().eq('id', id);
            showToast("🗑️ Eliminado");
            loadInventory(); loadProducts();
        }

        function prepareEdit(polo) {
            document.getElementById('formTitle').innerText = "Editando Polo";
            document.getElementById('editPoloId').value = polo.id;
            document.getElementById('prodName').value = polo.nombre;
            document.getElementById('prodPrice').value = polo.precio;
            document.getElementById('prodDesc').value = polo.descripcion || '';
            document.getElementById('cancelEdit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = "Agregar Nuevo Polo";
            document.getElementById('editPoloId').value = "";
            document.getElementById('prodName').value = "";
            document.getElementById('prodPrice').value = "";
            document.getElementById('prodDesc').value = "";
            document.getElementById('imgFileInput').value = "";
            document.getElementById('fileLabel').innerText = "📷 Seleccionar Imagen del Polo";
            document.getElementById('cancelEdit').style.display = 'none';
        }

        // FUNCIONES DE CARRITO
        function openModal(polo) {
            selectedPolo = polo;
            document.getElementById('modalImg').src = polo.imagen_url;
            document.getElementById('modalName').innerText = polo.nombre;
            document.getElementById('modalPrice').innerText = "S/ " + polo.precio.toFixed(2);
            document.getElementById('modalDesc').innerText = polo.descripcion || "Diseño exclusivo de Polo Studio.";
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

        function addToCartFromModal() {
            cart.push(selectedPolo);
            document.getElementById('cart-count').innerText = cart.length;
            showToast("🛒 Añadido!");
            closeModal();
        }

        function renderCart() {
            const list = document.getElementById('cartItemsList');
            const footer = document.getElementById('cartFooter');
            if (cart.length === 0) {
                list.innerHTML = "<p style='text-align:center; padding:50px;'>Carrito vacío.</p>";
                footer.style.display = 'none';
                return;
            }
            list.innerHTML = '';
            footer.style.display = 'block';
            let total = 0;
            cart.forEach((p, idx) => {
                total += p.precio;
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; background:white; margin-bottom:5px;">
                        <span>${p.nombre}</span>
                        <strong>S/ ${p.precio.toFixed(2)}</strong>
                    </div>`;
            });
            document.getElementById('cartTotalVal').innerText = `Total: S/ ${total.toFixed(2)}`;
        }

        function sendWhatsApp() {
            let msg = "¡Hola! Quisiera estos productos:%0A";
            cart.forEach(p => msg += `- ${p.nombre} (S/ ${p.precio.toFixed(2)})%0A`);
            window.open(`https://wa.me/51900000000?text=${msg}`); // Cambia este número por el tuyo
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateLabel() {
            const f = document.getElementById('imgFileInput').files[0];
            if(f) document.getElementById('fileLabel').innerHTML = "✅ " + f.name;
        }

        // TRUCO PARA ACTIVAR ADMIN (5 clics en logo)
        document.getElementById('secretLogo').addEventListener('click', () => {
            secretClicks++;
            if (secretClicks === 5) {
                document.getElementById('tab-admin').style.setProperty('display', 'inline-block', 'important');
                showToast("🔓 Modo Administrador");
                secretClicks = 0;
            }
            setTimeout(() => secretClicks = 0, 3000);
        });

        loadProducts();
    </script>
</body>
</html>
