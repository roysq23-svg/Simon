<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTICLE SIM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #555;
    --accent: #f97316;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  #title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--accent);
  }

  #stats {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #sidebar {
    width: 140px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .section-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 10px 10px 5px;
    text-transform: uppercase;
  }

  .mat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: left;
    width: 100%;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .mat-btn:hover { background: rgba(255,255,255,0.04); }
  .mat-btn.active {
    background: rgba(249,115,22,0.1);
    border-left-color: var(--accent);
    color: #fff;
  }

  .mat-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .sep { height: 1px; background: var(--border); margin: 6px 0; }

  .slider-wrap { padding: 6px 10px 10px; }
  .slider-wrap label { font-size: 9px; color: var(--muted); letter-spacing: 1px; display: block; margin-bottom: 5px; }
  input[type=range] {
    width: 100%; height: 3px; cursor: pointer;
    accent-color: var(--accent);
  }
  .slider-val { font-size: 10px; color: var(--text); text-align: right; margin-top: 3px; }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas { display: block; }

  #bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    font-size: 10px;
    color: var(--muted);
  }

  .hint { color: var(--text); }
  .hint span { color: var(--accent); margin-right: 4px; }

  #clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  #pause-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    margin-right: 6px;
  }
  #pause-btn:hover, #pause-btn.active { border-color: #3b82f6; color: #3b82f6; }
</style>
</head>
<body>

<div id="header">
  <div id="title">PARTICLE // SIM</div>
  <div id="stats">particles: <span id="pcount">0</span> &nbsp;|&nbsp; fps: <span id="fps">0</span></div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="section-label">Materials</div>
    <button class="mat-btn active" onclick="selectMat('sand',this)"><div class="mat-dot" style="background:#c2a35a"></div>Sand</button>
    <button class="mat-btn" onclick="selectMat('water',this)"><div class="mat-dot" style="background:#3b82f6"></div>Water</button>
    <button class="mat-btn" onclick="selectMat('fire',this)"><div class="mat-dot" style="background:#ef4444"></div>Fire</button>
    <button class="mat-btn" onclick="selectMat('smoke',this)"><div class="mat-dot" style="background:#6b7280"></div>Smoke</button>
    <button class="mat-btn" onclick="selectMat('wood',this)"><div class="mat-dot" style="background:#7c4f2a"></div>Wood</button>
    <button class="mat-btn" onclick="selectMat('oil',this)"><div class="mat-dot" style="background:#78350f"></div>Oil</button>
    <button class="mat-btn" onclick="selectMat('stone',this)"><div class="mat-dot" style="background:#6b7280"></div>Stone</button>
    <button class="mat-btn" onclick="selectMat('ice',this)"><div class="mat-dot" style="background:#bae6fd"></div>Ice</button>
    <button class="mat-btn" onclick="selectMat('lava',this)"><div class="mat-dot" style="background:#f97316"></div>Lava</button>
    <button class="mat-btn" onclick="selectMat('acid',this)"><div class="mat-dot" style="background:#84cc16"></div>Acid</button>
    <button class="mat-btn" onclick="selectMat('steam',this)"><div class="mat-dot" style="background:#94a3b8"></div>Steam</button>
    <button class="mat-btn" onclick="selectMat('gunpowder',this)"><div class="mat-dot" style="background:#3a3530"></div>Powder</button>
    <button class="mat-btn" onclick="selectMat('plant',this)"><div class="mat-dot" style="background:#16a34a"></div>Plant</button>
    <button class="mat-btn" onclick="selectMat('erase',this)"><div class="mat-dot" style="background:#374151;border:1px solid #555"></div>Erase</button>

    <div class="sep"></div>
    <div class="section-label">Brush size</div>
    <div class="slider-wrap">
      <label>SIZE</label>
      <input type="range" min="1" max="20" value="5" id="brush-size"
        oninput="brushSize=+this.value; document.getElementById('bval').textContent=this.value">
      <div class="slider-val" id="bval">5</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div id="bottombar">
  <div style="display:flex;gap:16px">
    <div class="hint"><span>Drag</span>Dibujar</div>
    <div class="hint"><span>R</span>Limpiar</div>
    <div class="hint"><span>Space</span>Pausa</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button id="pause-btn" onclick="togglePause()">&#9646;&#9646; PAUSA</button>
    <button id="clear-btn" onclick="clearGrid()">&#x2715; LIMPIAR</button>
  </div>
</div>

<script>
const EMPTY=0,SAND=1,WATER=2,FIRE=3,SMOKE=4,WOOD=5,STONE=6,ICE=7,LAVA=8,ACID=9,STEAM=10,GUNPOWDER=11,PLANT=12,OIL=13;

const MAT_MAP={sand:SAND,water:WATER,fire:FIRE,smoke:SMOKE,wood:WOOD,stone:STONE,ice:ICE,lava:LAVA,acid:ACID,steam:STEAM,gunpowder:GUNPOWDER,plant:PLANT,oil:OIL,erase:EMPTY};

const BASE_COLOR={
  [EMPTY]:[13,13,13],[SAND]:[194,163,90],[WATER]:[59,130,246],[FIRE]:[239,68,68],
  [SMOKE]:[107,114,128],[WOOD]:[124,79,42],[STONE]:[100,106,118],[ICE]:[186,230,253],
  [LAVA]:[249,115,22],[ACID]:[132,204,22],[STEAM]:[148,163,184],[GUNPOWDER]:[58,53,48],
  [PLANT]:[22,163,74],[OIL]:[90,45,15]
};

const IS_SOLID=t=>t===WOOD||t===STONE||t===ICE||t===PLANT;
const IS_LIQUID=t=>t===WATER||t===ACID||t===OIL||t===LAVA;
const IS_GAS=t=>t===FIRE||t===SMOKE||t===STEAM;
const IS_POWDER=t=>t===SAND||t===GUNPOWDER;
const IS_FLAMMABLE=t=>t===WOOD||t===OIL||t===GUNPOWDER||t===PLANT;

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

let W,H,COLS,ROWS;
let grid,color,updated,imageData,pixels;
let currentMat=SAND,brushSize=5;
let mouseDown=false,paused=false;
let fpsTimer=0,frameCount=0,currentFps=0;
let tick=0;

function resize(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W; canvas.height=H;
  COLS=Math.floor(W/2); ROWS=Math.floor(H/2);
  initGrid();
  imageData=ctx.createImageData(W,H);
  pixels=imageData.data;
}

function initGrid(){
  grid=new Uint8Array(COLS*ROWS);
  color=new Uint8Array(COLS*ROWS*3);
  updated=new Uint8Array(COLS*ROWS);
}

function clearGrid(){ grid.fill(0); color.fill(0); }

const idx=(x,y)=>y*COLS+x;
const inBounds=(x,y)=>x>=0&&y>=0&&x<COLS&&y<ROWS;
const get=(x,y)=>inBounds(x,y)?grid[idx(x,y)]:STONE;
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const chance=p=>Math.random()<p;

function set(x,y,type){
  if(!inBounds(x,y))return;
  const i=idx(x,y); grid[i]=type;
  const j=i*3;
  if(type===EMPTY){color[j]=color[j+1]=color[j+2]=0;return;}
  const b=BASE_COLOR[type];
  color[j]=Math.min(255,Math.max(0,b[0]+rnd(-15,15)));
  color[j+1]=Math.min(255,Math.max(0,b[1]+rnd(-10,10)));
  color[j+2]=Math.min(255,Math.max(0,b[2]+rnd(-10,10)));
}

function swap(x1,y1,x2,y2){
  if(!inBounds(x2,y2))return;
  const i1=idx(x1,y1),i2=idx(x2,y2);
  let t=grid[i1];grid[i1]=grid[i2];grid[i2]=t;
  const j1=i1*3,j2=i2*3;
  let r=color[j1],g=color[j1+1],b=color[j1+2];
  color[j1]=color[j2];color[j1+1]=color[j2+1];color[j1+2]=color[j2+2];
  color[j2]=r;color[j2+1]=g;color[j2+2]=b;
}

function step(){
  tick++;
  updated.fill(0);
  for(let y=ROWS-1;y>=0;y--){
    const ltr=(tick+y)%2===0;
    for(let xi=0;xi<COLS;xi++){
      const x=ltr?xi:(COLS-1-xi);
      const i=idx(x,y);
      if(updated[i])continue;
      const t=grid[i];
      if(t===EMPTY)continue;
      if(IS_POWDER(t))       stepPowder(x,y,t,i);
      else if(IS_LIQUID(t))  stepLiquid(x,y,t,i);
      else if(t===FIRE)      stepFire(x,y,i);
      else if(t===SMOKE)     stepSmoke(x,y,i);
      else if(t===STEAM)     stepSteam(x,y,i);
      else if(t===LAVA)      stepLava(x,y,i);
      else if(t===ICE)       stepIce(x,y,i);
      else if(t===PLANT)     stepPlant(x,y,i);
      else if(t===ACID)      stepAcid(x,y,i);
    }
  }
}

function stepPowder(x,y,t,i){
  if(get(x,y+1)===EMPTY||IS_LIQUID(get(x,y+1))){swap(x,y,x,y+1);updated[idx(x,y+1)]=1;return;}
  const d=chance(0.5)?1:-1;
  if(inBounds(x+d,y+1)&&(get(x+d,y+1)===EMPTY||IS_LIQUID(get(x+d,y+1)))){swap(x,y,x+d,y+1);updated[idx(x+d,y+1)]=1;return;}
  if(inBounds(x-d,y+1)&&(get(x-d,y+1)===EMPTY||IS_LIQUID(get(x-d,y+1)))){swap(x,y,x-d,y+1);updated[idx(x-d,y+1)]=1;return;}
  if(t===GUNPOWDER){
    for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
      if(get(nx,ny)===FIRE||get(nx,ny)===LAVA){
        set(x,y,FIRE);updated[i]=1;
        for(let ex=-3;ex<=3;ex++)for(let ey=-3;ey<=3;ey++)
          if(ex*ex+ey*ey<=9&&chance(0.65)&&inBounds(x+ex,y+ey))set(x+ex,y+ey,FIRE);
        return;
      }
    }
  }
}

function stepLiquid(x,y,t,i){
  if(get(x,y+1)===EMPTY){swap(x,y,x,y+1);updated[idx(x,y+1)]=1;return;}
  const d=chance(0.5)?1:-1;
  const sp=t===WATER?5:t===OIL?3:t===ACID?6:2;
  for(let s=1;s<=sp;s++){
    if(get(x+d*s,y)===EMPTY){swap(x,y,x+d*s,y);updated[idx(x+d*s,y)]=1;return;}
    if(!IS_LIQUID(get(x+d*s,y)))break;
  }
  for(let s=1;s<=sp;s++){
    if(get(x-d*s,y)===EMPTY){swap(x,y,x-d*s,y);updated[idx(x-d*s,y)]=1;return;}
    if(!IS_LIQUID(get(x-d*s,y)))break;
  }
  if(inBounds(x+d,y+1)&&get(x+d,y+1)===EMPTY){swap(x,y,x+d,y+1);updated[idx(x+d,y+1)]=1;return;}
  if(inBounds(x-d,y+1)&&get(x-d,y+1)===EMPTY){swap(x,y,x-d,y+1);updated[idx(x-d,y+1)]=1;return;}
}

function stepFire(x,y,i){
  const j=i*3;
  if(chance(0.35)){color[j]=rnd(200,255);color[j+1]=rnd(40,160);color[j+2]=0;}
  if(get(x,y-1)===EMPTY&&chance(0.55)){
    if(chance(0.18))set(x,y-1,SMOKE);
    swap(x,y,x,y-1);updated[idx(x,y-1)]=1;
  } else if(chance(0.05)){
    if(get(x,y-1)===EMPTY)set(x,y-1,SMOKE);
    grid[i]=EMPTY;
  }
  for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1],[x-1,y-1],[x+1,y-1]]){
    if(!inBounds(nx,ny))continue;
    const nt=get(nx,ny);
    if(IS_FLAMMABLE(nt)&&chance(0.02))set(nx,ny,FIRE);
    if(nt===WATER&&chance(0.25)){set(nx,ny,STEAM);grid[i]=EMPTY;return;}
    if(nt===ICE&&chance(0.06))set(nx,ny,WATER);
    if(nt===OIL&&chance(0.04))set(nx,ny,FIRE);
  }
}

function stepSmoke(x,y,i){
  if(chance(0.012)){grid[i]=EMPTY;return;}
  const j=i*3;
  if(chance(0.05)){color[j]=rnd(90,130);color[j+1]=rnd(90,130);color[j+2]=rnd(90,130);}
  const d=rnd(-1,1);
  if(inBounds(x+d,y-1)&&get(x+d,y-1)===EMPTY){swap(x,y,x+d,y-1);updated[idx(x+d,y-1)]=1;}
  else if(get(x,y-1)===EMPTY){swap(x,y,x,y-1);updated[idx(x,y-1)]=1;}
  else if(inBounds(x+d,y)&&get(x+d,y)===EMPTY&&chance(0.35)){swap(x,y,x+d,y);updated[idx(x+d,y)]=1;}
}

function stepSteam(x,y,i){
  if(chance(0.007)){grid[i]=EMPTY;return;}
  if(chance(0.0008))set(x,y,WATER);
  const d=rnd(-1,1);
  if(inBounds(x+d,y-1)&&get(x+d,y-1)===EMPTY){swap(x,y,x+d,y-1);updated[idx(x+d,y-1)]=1;}
  else if(get(x,y-1)===EMPTY){swap(x,y,x,y-1);updated[idx(x,y-1)]=1;}
  else if(inBounds(x+d,y)&&get(x+d,y)===EMPTY&&chance(0.4)){swap(x,y,x+d,y);updated[idx(x+d,y)]=1;}
}

function stepLava(x,y,i){
  const j=i*3;
  if(chance(0.2)){color[j]=rnd(220,255);color[j+1]=rnd(60,140);color[j+2]=0;}
  if(get(x,y+1)===EMPTY){swap(x,y,x,y+1);updated[idx(x,y+1)]=1;return;}
  const d=chance(0.5)?1:-1;
  if(chance(0.12)){
    if(inBounds(x+d,y)&&get(x+d,y)===EMPTY){swap(x,y,x+d,y);updated[idx(x+d,y)]=1;return;}
    if(inBounds(x+d,y+1)&&get(x+d,y+1)===EMPTY){swap(x,y,x+d,y+1);updated[idx(x+d,y+1)]=1;return;}
  }
  for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
    if(!inBounds(nx,ny))continue;
    const nt=get(nx,ny);
    if(IS_FLAMMABLE(nt)&&chance(0.03))set(nx,ny,FIRE);
    if(nt===WATER&&chance(0.04)){set(nx,ny,STONE);set(x,y,STONE);return;}
    if(nt===ICE&&chance(0.08))set(nx,ny,WATER);
  }
  if(chance(0.0003))set(x,y,STONE);
}

function stepIce(x,y,i){
  for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
    if(!inBounds(nx,ny))continue;
    const nt=get(nx,ny);
    if((nt===FIRE||nt===LAVA)&&chance(0.04)){set(x,y,WATER);return;}
  }
  if(chance(0.0008)){
    for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
      if(get(nx,ny)===WATER&&chance(0.25)){set(nx,ny,ICE);return;}
    }
  }
}

function stepPlant(x,y,i){
  if(chance(0.0015)){
    for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
      if(get(nx,ny)===WATER){set(nx,ny,PLANT);return;}
      if(get(nx,ny)===EMPTY&&chance(0.08)){set(nx,ny,PLANT);return;}
    }
  }
  for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
    if(!inBounds(nx,ny))continue;
    if((get(nx,ny)===FIRE||get(nx,ny)===LAVA)&&chance(0.04)){set(x,y,FIRE);return;}
  }
}

function stepAcid(x,y,i){
  if(get(x,y+1)===EMPTY){swap(x,y,x,y+1);updated[idx(x,y+1)]=1;return;}
  const d=chance(0.5)?1:-1;
  if(inBounds(x+d,y)&&get(x+d,y)===EMPTY){swap(x,y,x+d,y);updated[idx(x+d,y)]=1;return;}
  if(inBounds(x+d,y+1)&&get(x+d,y+1)===EMPTY){swap(x,y,x+d,y+1);updated[idx(x+d,y+1)]=1;return;}
  for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){
    if(!inBounds(nx,ny))continue;
    const nt=get(nx,ny);
    if(nt!==EMPTY&&nt!==ACID&&nt!==STONE&&chance(0.025)){
      set(nx,ny,EMPTY);
      if(chance(0.35))grid[i]=EMPTY;
      return;
    }
  }
}

function renderFrame(){
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const i=idx(x,y);
      const t=grid[i];
      let r,g,b;
      if(t===EMPTY){r=13;g=13;b=13;}
      else{const j=i*3;r=color[j];g=color[j+1];b=color[j+2];}
      const px=(y*2)*W*4+x*2*4;
      pixels[px]=r;pixels[px+1]=g;pixels[px+2]=b;pixels[px+3]=255;
      pixels[px+4]=r;pixels[px+5]=g;pixels[px+6]=b;pixels[px+7]=255;
      const px2=px+W*4;
      if(px2+7<pixels.length){
        pixels[px2]=r;pixels[px2+1]=g;pixels[px2+2]=b;pixels[px2+3]=255;
        pixels[px2+4]=r;pixels[px2+5]=g;pixels[px2+6]=b;pixels[px2+7]=255;
      }
    }
  }
  ctx.putImageData(imageData,0,0);
}

function drawAt(cx,cy){
  const gx=Math.floor(cx/2),gy=Math.floor(cy/2),r=brushSize;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy>r*r)continue;
      const nx=gx+dx,ny=gy+dy;
      if(!inBounds(nx,ny))continue;
      if(currentMat===EMPTY)grid[idx(nx,ny)]=EMPTY;
      else if(chance(0.7))set(nx,ny,currentMat);
    }
  }
}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-rect.left,y:src.clientY-rect.top};
}

canvas.addEventListener('mousedown',e=>{mouseDown=true;const p=getPos(e);drawAt(p.x,p.y);});
canvas.addEventListener('mouseup',()=>mouseDown=false);
canvas.addEventListener('mouseleave',()=>mouseDown=false);
canvas.addEventListener('mousemove',e=>{if(mouseDown){const p=getPos(e);drawAt(p.x,p.y);}});
canvas.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;const p=getPos(e);drawAt(p.x,p.y);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(mouseDown){const p=getPos(e);drawAt(p.x,p.y);}},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePause();}
  if(e.key==='r'||e.key==='R')clearGrid();
});

function selectMat(name,btn){
  currentMat=MAT_MAP[name];
  document.querySelectorAll('.mat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function togglePause(){
  paused=!paused;
  const btn=document.getElementById('pause-btn');
  btn.classList.toggle('active',paused);
  btn.textContent=paused?'▶ REANUDAR':'⏸ PAUSA';
}

let lastPCount=0,pcTimer=0;
function loop(ts){
  requestAnimationFrame(loop);
  frameCount++;
  if(ts-fpsTimer>=600){
    currentFps=Math.round(frameCount*1000/(ts-fpsTimer));
    frameCount=0;fpsTimer=ts;
    document.getElementById('fps').textContent=currentFps;
  }
  if(ts-pcTimer>=800){
    pcTimer=ts;
    let c=0;for(let i=0;i<grid.length;i++)if(grid[i]!==EMPTY)c++;
    document.getElementById('pcount').textContent=c;
  }
  if(!paused)step();
  renderFrame();
}

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
