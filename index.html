<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogri| Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo" id="secretLogo">
                <img src="Logo.jpeg" alt="Jogri">
            </div>
            <div class="menu">
                <button onclick="switchTab('store')">Tienda</button>
                <button id="tab-admin" onclick="switchTab('admin')" style="display:none !important;">Admin</button>
                <button class="cart-btn" onclick="switchTab('cart')">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="panel active">
            <div class="hero-content">
                <h1>ESTILO QUE <br> HABLA POR TI.</h1>
                <p>Colección Premium 2026. Envíos a todo el país.</p>
                <button class="btn-primary" onclick="switchTab('store')">VER TIENDA</button>
            </div>
        </section>

        <section id="panel-store" class="panel">
            <h2 class="section-title">Nuestros Polos</h2>
            <div class="products-grid" id="storeGrid"></div>
        </section>

        <section id="panel-cart" class="panel">
            <div class="cart-container">
                <h2 class="section-title">Tu Carrito</h2>
                <div id="cartItemsList"></div>
                <div id="cartFooter" style="display:none">
                    <h3 id="cartTotalVal">Total: S/ 0.00</h3>
                    <button class="wsp-btn" onclick="sendWhatsApp()">PEDIR POR WHATSAPP</button>
                </div>
            </div>
        </section>

        <section id="panel-admin" class="panel">
            <div class="admin-grid">
                <div class="admin-form">
                    <h3 id="formTitle">➕ Agregar Nuevo Polo</h3>
                    <input type="hidden" id="editPoloId">
                    <div class="field">
                        <label for="imgFileInput" class="file-label" id="fileLabel">📷 Click para elegir foto</label>
                        <input type="file" id="imgFileInput" accept="image/*" hidden onchange="updateLabel()">
                    </div>
                    <input type="text" id="prodName" placeholder="Nombre del polo">
                    <input type="number" id="prodPrice" placeholder="Precio (S/)">
                    <textarea id="prodDesc" placeholder="Descripción del producto..."></textarea>
                    <button class="save-product-btn" id="saveBtn" onclick="saveProduct()">GUARDAR PRODUCTO</button>
                    <button id="cancelEdit" class="btn-cancel" onclick="resetForm()">Cancelar edición</button>
                </div>
                
                <div class="admin-inventory">
                    <h3>📦 Inventario Actual</h3>
                    <div id="adminInventoryList"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">×</button>
            <img id="modalImg" src="">
            <div class="modal-info">
                <h2 id="modalName"></h2>
                <p id="modalPrice"></p>
                <p id="modalDescDetail" style="margin-bottom: 20px; font-size: 14px; color: #555;"></p>
                <button class="btn-primary" onclick="addToCartFromModal()">AÑADIR AL CARRITO</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
