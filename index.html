
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{padding:1rem 0}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:0}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#378ADD;border-bottom-color:#378ADD}
.panel{display:none}.panel.active{display:block}

/* ADMIN */
.admin-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.admin-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
.field textarea{resize:vertical;min-height:60px}
.upload-area{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
.upload-area:hover{border-color:#378ADD}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-area p{font-size:13px;color:var(--color-text-secondary)}
.preview-img{width:100%;max-height:160px;object-fit:contain;border-radius:var(--border-radius-md);margin-top:8px}
.colors-editor{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.color-tag{display:flex;align-items:center;gap:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:999px;padding:3px 10px 3px 6px;font-size:12px;color:var(--color-text-primary)}
.color-dot-sm{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.color-tag button{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:14px;line-height:1;padding:0 0 0 2px}
.color-input-row{display:flex;gap:6px;margin-top:6px}
.color-input-row input[type=text]{flex:1}
.color-input-row input[type=color]{width:36px;height:36px;padding:2px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary)}
.sizes-check{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.size-check{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--color-text-primary);cursor:pointer}
.save-btn{width:100%;padding:10px;border-radius:var(--border-radius-md);border:none;background:#378ADD;color:white;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.save-btn:hover{opacity:.88}
.products-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.admin-product{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.75rem;position:relative}
.admin-product img{width:100%;height:90px;object-fit:cover;border-radius:var(--border-radius-md);margin-bottom:8px}
.admin-product-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.admin-product-price{font-size:12px;color:var(--color-text-secondary)}
.del-btn{position:absolute;top:8px;right:8px;background:#E24B4A;color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.wsp-field{display:flex;gap:8px;align-items:center}
.wsp-field input{flex:1}
.wsp-save{padding:8px 14px;border-radius:var(--border-radius-md);border:none;background:#25D366;color:white;font-size:13px;font-weight:500;cursor:pointer}

/* TIENDA */
.store-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:1.5rem}
.prod-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s}
.prod-card:hover{border-color:var(--color-border-secondary)}
.prod-card img{width:100%;height:150px;object-fit:cover;display:block}
.prod-card-body{padding:.75rem}
.prod-card-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.prod-card-price{font-size:13px;color:#378ADD;margin-top:2px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);width:100%;max-width:420px;padding:1.25rem;max-height:90vh;overflow-y:auto}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--color-text-secondary);margin-left:8px}
.modal-img{width:100%;height:200px;object-fit:contain;border-radius:var(--border-radius-md);margin-bottom:1rem;background:var(--color-background-secondary)}
.modal-name{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.modal-price{font-size:15px;color:#378ADD;margin:4px 0 12px}
.sect{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin-bottom:6px}
.color-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.color-opt{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.color-opt:hover{transform:scale(1.12)}
.color-opt.sel{box-shadow:0 0 0 2px var(--color-background-primary),0 0 0 4px #378ADD}
.size-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.size-opt{padding:5px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);transition:all .1s}
.size-opt:hover{background:var(--color-background-secondary)}
.size-opt.sel{background:#378ADD;color:white;border-color:#378ADD}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.qty-btn{width:30px;height:30px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:16px;cursor:pointer}
.qty-num{font-size:14px;font-weight:500;min-width:18px;text-align:center;color:var(--color-text-primary)}
.modal-add{width:100%;padding:10px;border-radius:var(--border-radius-md);border:none;background:#378ADD;color:white;font-size:14px;font-weight:500;cursor:pointer}
.modal-add:disabled{opacity:.4;cursor:not-allowed}

/* CARRITO */
.cart-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.cart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.cart-hd{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.badge{background:#378ADD;color:white;font-size:11px;border-radius:999px;padding:2px 7px}
.empty{text-align:center;padding:1.5rem;font-size:13px;color:var(--color-text-secondary)}
.cart-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:0.5px solid var(--color-border-tertiary)}
.cart-item-img{width:44px;height:44px;object-fit:cover;border-radius:var(--border-radius-md);flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-detail{font-size:12px;color:var(--color-text-secondary)}
.cart-item-price{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;padding:0 4px}
.rm-btn:hover{color:#E24B4A}
.total-row{display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary);margin-top:4px}
.total-lbl{font-size:14px;color:var(--color-text-secondary)}
.total-val{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.wsp-btn{width:100%;padding:11px;border-radius:var(--border-radius-md);border:none;background:#25D366;color:white;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.wsp-btn:hover{opacity:.9}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:white;padding:8px 18px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.empty-store{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
</style>

<h2 class="sr-only">Tienda de polos con carrito y envío por WhatsApp</h2>
<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('store')">🛍️ Tienda</button>
    <button class="tab" onclick="switchTab('admin')">⚙️ Administrar</button>
  </div>

  <!-- TIENDA -->
  <div class="panel active" id="panel-store">
    <div class="store-grid" id="storeGrid"></div>
    <div class="cart-box">
      <div class="cart-top">
        <span class="cart-hd">Carrito de compras</span>
        <span class="badge" id="cartBadge">0</span>
      </div>
      <div id="cartItems"><div class="empty">Tu carrito está vacío</div></div>
      <div id="cartFooter" style="display:none">
        <div class="total-row">
          <span class="total-lbl">Total del pedido</span>
          <span class="total-val" id="totalVal">S/ 0.00</span>
        </div>
        <button class="wsp-btn" onclick="sendWhatsApp()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pedido por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="panel" id="panel-admin">
    <div class="admin-card">
      <div class="admin-title">📱 Número de WhatsApp</div>
      <div class="field">
        <label>Número (con código de país, sin + ni espacios)</label>
        <div class="wsp-field">
          <input type="text" id="wspNum" placeholder="51999999999" value="51999999999">
          <button class="wsp-save" onclick="saveWsp()">Guardar</button>
        </div>
      </div>
    </div>
    <div class="admin-card">
      <div class="admin-title">➕ Agregar producto</div>
      <div class="field">
        <label>Foto del polo</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" accept="image/*" onchange="handleImg(event)" id="imgInput">
          <p id="uploadTxt">📷 Haz clic o arrastra una foto aquí</p>
          <img id="imgPreview" class="preview-img" style="display:none">
        </div>
      </div>
      <div class="field"><label>Nombre del producto</label><input type="text" id="prodName" placeholder="Polo básico blanco"></div>
      <div class="field"><label>Precio (S/)</label><input type="number" id="prodPrice" placeholder="35" min="1"></div>
      <div class="field"><label>Descripción (opcional)</label><textarea id="prodDesc" placeholder="Polo de algodón 100%, muy cómodo..."></textarea></div>
      <div class="field">
        <label>Colores disponibles</label>
        <div id="colorTags" class="colors-editor"></div>
        <div class="color-input-row">
          <input type="text" id="colorName" placeholder="Ej: Blanco, Azul marino...">
          <input type="color" id="colorPick" value="#378ADD">
          <button class="wsp-save" onclick="addColor()">+</button>
        </div>
      </div>
      <div class="field">
        <label>Tallas disponibles</label>
        <div class="sizes-check" id="sizesCheck">
          ${['XS','S','M','L','XL','XXL'].map(s=>`<label class="size-check"><input type="checkbox" value="${s}" checked> ${s}</label>`).join('')}
        </div>
      </div>
      <button class="save-btn" onclick="addProduct()">Guardar producto</button>
    </div>
    <div class="admin-card">
      <div class="admin-title">📦 Productos registrados</div>
      <div class="products-list" id="adminProductList"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">×</button>
    <img id="mImg" class="modal-img" src="" alt="">
    <div id="mName" class="modal-name"></div>
    <div id="mPrice" class="modal-price"></div>
    <div id="mDesc" style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px"></div>
    <div class="sect">Color</div>
    <div class="color-opts" id="mColors"></div>
    <div class="sect">Talla</div>
    <div class="size-opts" id="mSizes"></div>
    <div class="sect">Cantidad</div>
    <div class="qty-row">
      <button class="qty-btn" onclick="chgQty(-1)">−</button>
      <span class="qty-num" id="mQty">1</span>
      <button class="qty-btn" onclick="chgQty(1)">+</button>
    </div>
    <button class="modal-add" id="mAddBtn" onclick="addToCart()" disabled>Selecciona color y talla</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = JSON.parse(localStorage.getItem('polo_products') || '[]');
let cart = [];
let wspNumber = localStorage.getItem('polo_wsp') || '51999999999';
let newColors = [];
let imgData = null;
let modalProduct = null;
let selColor = null;
let selSize = null;
let mQty = 1;

document.getElementById('wspNum').value = wspNumber;

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['store','admin'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='store') renderStore();
  if(t==='admin') renderAdminList();
}

function saveWsp() {
  wspNumber = document.getElementById('wspNum').value.trim().replace(/\D/g,'');
  localStorage.setItem('polo_wsp', wspNumber);
  toast('✓ Número guardado');
}

function handleImg(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgData = ev.target.result;
    const prev = document.getElementById('imgPreview');
    prev.src = imgData;
    prev.style.display = 'block';
    document.getElementById('uploadTxt').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function addColor() {
  const name = document.getElementById('colorName').value.trim();
  const hex = document.getElementById('colorPick').value;
  if(!name) return;
  newColors.push({name, hex});
  document.getElementById('colorName').value = '';
  renderColorTags();
}

function renderColorTags() {
  document.getElementById('colorTags').innerHTML = newColors.map((c,i)=>`
    <div class="color-tag">
      <div class="color-dot-sm" style="background:${c.hex}"></div>
      ${c.name}
      <button onclick="newColors.splice(${i},1);renderColorTags()">×</button>
    </div>`).join('');
}

function addProduct() {
  const name = document.getElementById('prodName').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value);
  const desc = document.getElementById('prodDesc').value.trim();
  const sizes = Array.from(document.querySelectorAll('#sizesCheck input:checked')).map(c=>c.value);
  if(!name || !price || !imgData) { toast('⚠️ Completa nombre, precio y foto'); return; }
  if(newColors.length === 0) { toast('⚠️ Agrega al menos un color'); return; }
  if(sizes.length === 0) { toast('⚠️ Selecciona al menos una talla'); return; }
  const prod = { id: Date.now(), name, price, desc, img: imgData, colors: [...newColors], sizes };
  products.push(prod);
  localStorage.setItem('polo_products', JSON.stringify(products));
  newColors = [];
  imgData = null;
  document.getElementById('prodName').value = '';
  document.getElementById('prodPrice').value = '';
  document.getElementById('prodDesc').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('uploadTxt').style.display = 'block';
  document.getElementById('imgInput').value = '';
  renderColorTags();
  renderAdminList();
  toast('✓ Producto guardado');
}

function deleteProduct(id) {
  products = products.filter(p=>p.id!==id);
  localStorage.setItem('polo_products', JSON.stringify(products));
  renderAdminList();
  renderStore();
  toast('Producto eliminado');
}

function renderAdminList() {
  const el = document.getElementById('adminProductList');
  if(!products.length){ el.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary)">Sin productos aún</p>'; return; }
  el.innerHTML = products.map(p=>`
    <div class="admin-product">
      <button class="del-btn" onclick="deleteProduct(${p.id})">×</button>
      <img src="${p.img}" alt="${p.name}">
      <div class="admin-product-name">${p.name}</div>
      <div class="admin-product-price">S/ ${p.price.toFixed(2)}</div>
    </div>`).join('');
}

function renderStore() {
  const grid = document.getElementById('storeGrid');
  if(!products.length){
    grid.innerHTML = '<div class="empty-store">🛍️ Aún no hay productos.<br>Ve a <b>Administrar</b> para agregar.</div>';
    return;
  }
  grid.innerHTML = products.map(p=>`
    <div class="prod-card" onclick="openModal(${p.id})">
      <img src="${p.img}" alt="${p.name}">
      <div class="prod-card-body">
        <div class="prod-card-name">${p.name}</div>
        <div class="prod-card-price">S/ ${p.price.toFixed(2)}</div>
      </div>
    </div>`).join('');
}

function openModal(id) {
  modalProduct = products.find(p=>p.id===id);
  if(!modalProduct) return;
  selColor = null; selSize = null; mQty = 1;
  document.getElementById('mImg').src = modalProduct.img;
  document.getElementById('mName').textContent = modalProduct.name;
  document.getElementById('mPrice').textContent = 'S/ ' + modalProduct.price.toFixed(2);
  document.getElementById('mDesc').textContent = modalProduct.desc || '';
  document.getElementById('mQty').textContent = '1';
  document.getElementById('mColors').innerHTML = modalProduct.colors.map(c=>`
    <div class="color-opt" style="background:${c.hex};border-color:${c.hex}" title="${c.name}" onclick="pickColor('${c.name}','${c.hex}',this)"></div>`).join('');
  document.getElementById('mSizes').innerHTML = modalProduct.sizes.map(s=>`
    <div class="size-opt" onclick="pickSize('${s}',this)">${s}</div>`).join('');
  updateModalBtn();
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) { if(e.target.id==='modal') document.getElementById('modal').style.display='none'; }

function pickColor(name, hex, el) {
  selColor = {name, hex};
  document.querySelectorAll('.color-opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  updateModalBtn();
}

function pickSize(s, el) {
  selSize = s;
  document.querySelectorAll('.size-opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  updateModalBtn();
}

function chgQty(d) {
  mQty = Math.max(1, Math.min(10, mQty+d));
  document.getElementById('mQty').textContent = mQty;
}

function updateModalBtn() {
  const btn = document.getElementById('mAddBtn');
  if(selColor && selSize) { btn.disabled=false; btn.textContent='Agregar al carrito'; }
  else { btn.disabled=true; btn.textContent='Selecciona '+(selColor?'talla':'color y talla'); }
}

function addToCart() {
  const key = `${modalProduct.id}-${selColor.name}-${selSize}`;
  const existing = cart.find(i=>i.key===key);
  if(existing) existing.qty = Math.min(10, existing.qty+mQty);
  else cart.push({ key, id: modalProduct.id, name: modalProduct.name, img: modalProduct.img, price: modalProduct.price, colorName: selColor.name, colorHex: selColor.hex, size: selSize, qty: mQty });
  document.getElementById('modal').style.display = 'none';
  renderCart();
  toast('✓ Agregado al carrito');
}

function removeItem(key) {
  cart = cart.filter(i=>i.key!==key);
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const foot = document.getElementById('cartFooter');
  const badge = document.getElementById('cartBadge');
  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  badge.textContent = cart.reduce((a,i)=>a+i.qty,0);
  if(!cart.length){ el.innerHTML='<div class="empty">Tu carrito está vacío</div>'; foot.style.display='none'; return; }
  el.innerHTML = cart.map(i=>`
    <div class="cart-item">
      <img class="cart-item-img" src="${i.img}" alt="${i.name}">
      <div class="cart-item-info">
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-detail">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${i.colorHex};vertical-align:middle;margin-right:4px"></span>${i.colorName} · ${i.size} · x${i.qty}
        </div>
      </div>
      <div class="cart-item-price">S/ ${(i.price*i.qty).toFixed(2)}</div>
      <button class="rm-btn" onclick="removeItem('${i.key}')">×</button>
    </div>`).join('');
  document.getElementById('totalVal').textContent = 'S/ ' + total.toFixed(2);
  foot.style.display = 'block';
}

function sendWhatsApp() {
  if(!cart.length) return;
  const lines = cart.map(i=>`• ${i.name} | Color: ${i.colorName} | Talla: ${i.size} | Cant: ${i.qty} | S/ ${(i.price*i.qty).toFixed(2)}`);
  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const msg = `🛍️ *NUEVO PEDIDO*\n\n${lines.join('\n')}\n\n*TOTAL: S/ ${total.toFixed(2)}*\n\nPor favor confirmar disponibilidad y forma de pago. ¡Gracias!`;
  const url = `https://wa.me/${wspNumber}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

renderStore();
renderAdminList();
</script>
