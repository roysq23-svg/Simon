<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLO STUDIO | Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo">POLO<span>STUDIO</span></div>
            <div class="menu">
                <button onclick="switchTab('store')">Tienda</button>
                <button onclick="switchTab('admin')">Admin</button>
                <button class="cart-btn" onclick="switchTab('cart')">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="panel active">
            <div class="hero-content">
                <h1>ESTILO QUE <br> HABLA POR TI.</h1>
                <p>Nueva colección de polos oversize ya disponible.</p>
                <button class="btn-primary" onclick="switchTab('store')">VER COLECCIÓN</button>
            </div>
        </section>

        <section id="panel-store" class="panel">
            <h2 class="section-title">Nuestros Polos</h2>
            <div class="products-grid" id="storeGrid">
                </div>
        </section>

        <section id="panel-cart" class="panel">
            <div class="cart-container">
                <h2>Tu Carrito</h2>
                <div id="cartItemsList"></div>
                <div id="cartFooter" style="display:none">
                    <h3 id="cartTotalVal">Total: S/ 0.00</h3>
                    <button class="wsp-btn" onclick="sendWhatsApp()">PEDIR POR WHATSAPP</button>
                </div>
            </div>
        </section>

        <section id="panel-admin" class="panel">
            <div class="admin-form">
                <h3>Subir Nuevo Producto</h3>
                <input type="file" id="imgFileInput" hidden>
                <label for="imgFileInput" class="file-label">📷 Seleccionar Imagen</label>
                <input type="text" id="prodName" placeholder="Nombre del polo">
                <input type="number" id="prodPrice" placeholder="Precio (S/)">
                <button class="save-product-btn" id="saveBtn" onclick="saveProduct()">PUBLICAR AHORA</button>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">×</button>
            <img id="modalImg" src="">
            <div class="modal-info">
                <h2 id="modalName"></h2>
                <p id="modalPrice"></p>
                <button class="btn-primary" onclick="addToCartFromModal()">AÑADIR AL CARRITO</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
